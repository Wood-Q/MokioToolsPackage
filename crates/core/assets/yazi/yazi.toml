[mgr]
ratio = [1, 2, 5]
sort_by = "natural"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true
linemode = "size"
show_hidden = false
show_symlink = true
scrolloff = 5
mouse_events = ["click", "scroll"]
title_format = "Yazi: {cwd}"

[preview]
max_width = 600
max_height = 900
image_filter = "lanczos3"
image_quality = 75

[opener]
edit = [
  { run = 'code %s', desc = "VSCode", for = "macos", orphan = true },
  { run = 'code %s', desc = "VSCode", for = "linux", orphan = true },
  { run = '${EDITOR:-vi} %s', desc = "$EDITOR", for = "unix", block = true },
]
open = [
  { run = 'open %s', desc = "Open", for = "macos" },
  { run = "xdg-open %s1", desc = "Open", for = "linux" },
]
reveal = [
  { run = 'open -R %s1', desc = "Reveal in Finder", for = "macos" },
  { run = 'xdg-open %d1', desc = "Reveal", for = "linux" },
]

[open]
prepend_rules = [
  { mime = "text/*", use = ["edit", "open", "reveal"] },
  { mime = "application/json", use = ["edit", "open", "reveal"] },
  { mime = "*/javascript", use = ["edit", "open", "reveal"] },
  { mime = "*/typescript", use = ["edit", "open", "reveal"] },
  { mime = "*/x-yaml", use = ["edit", "open", "reveal"] },
]

[tasks]
micro_workers = 10
macro_workers = 25
bizarre_retry = 5

[plugin]
prepend_fetchers = [
  # Yazi 26.x: name -> url, must carry a group field
  { id = "git", url = "*", run = "git", prio = "normal", group = "git" },
]
